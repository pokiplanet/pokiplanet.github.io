<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raining PNG Background</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            height: 100vh;
            width: 100vw;
        }

        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .raindrop {
            position: absolute;
            opacity: 0;
            will-change: transform, opacity;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(calc(100vh + 50px)) rotate(360deg);
                opacity: 0;
            }
        }

        /* Content area styling */
        .content {
            position: relative;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container" id="rain-container"></div>
    
    <div class="content">
        <h1>Your Website Content Here</h1>
        <p>This is where your actual website content would go. The raining PNGs will appear in the background.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('rain-container');
            const totalImages = 151;
            const maxRaindrops = 40;
            const minSize = 30;
            const maxSize = 80;
            const minDuration = 8;
            const maxDuration = 15;
            
            // Preload images
            const preloadedImages = [];
            for (let i = 1; i <= totalImages; i++) {
                const img = new Image();
                img.src = `/bg/${i}.png`;
                preloadedImages.push(img);
            }
            
            function createRaindrop() {
                if (container.children.length >= maxRaindrops) return;
                
                const raindrop = document.createElement('img');
                const imageNumber = Math.floor(Math.random() * totalImages) + 1;
                raindrop.src = `/bg/${imageNumber}.png`;
                raindrop.className = 'raindrop';
                
                // Set random position, size and animation duration
                const size = Math.random() * (maxSize - minSize) + minSize;
                const left = Math.random() * 100;
                const duration = Math.random() * (maxDuration - minDuration) + minDuration;
                
                raindrop.style.width = `${size}px`;
                raindrop.style.height = 'auto';
                raindrop.style.left = `${left}%`;
                raindrop.style.animationDuration = `${duration}s`;
                
                // Add some randomness to starting position
                const delay = Math.random() * 5;
                raindrop.style.animationDelay = `${delay}s`;
                
                container.appendChild(raindrop);
                
                // Remove raindrop after animation completes
                setTimeout(() => {
                    if (raindrop.parentNode === container) {
                        container.removeChild(raindrop);
                    }
                    createRaindrop(); // Create a new one to replace it
                }, (duration + delay) * 1000);
            }
            
            // Initial creation of raindrops
            for (let i = 0; i < maxRaindrops; i++) {
                setTimeout(() => {
                    createRaindrop();
                }, Math.random() * 3000); // Stagger the initial creation
            }
            
            // Create new raindrops periodically
            setInterval(createRaindrop, 500);
        });
    </script>
</body>
</html>
