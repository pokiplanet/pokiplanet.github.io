<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokiPlanet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        body {
            font-family: monospace;
            background-image: url('pallet-town-night.webp');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(0.5px);
            border: 2px solid white;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 42rem;
            width: 100%;
            padding: 2rem;
        }

        .card-content {
            display: flex;
            align-items: center;
        }

        .pikachu-image {
            width: 5rem;
            height: 3.5rem;
            margin-right: 1.5rem;
            object-fit: cover;
            overflow: visible;
        }

        .text-section {
            flex-grow: 1;
            border-left: 2px solid white;
            padding-left: 1.5rem;
        }

        .text-section h1 {
            color: white;
            font-size: 1.875rem;
            margin-bottom: 0.5rem;
        }

        .text-section p {
            color: white;
            font-size: 1.25rem;
        }

        .footer {
            padding: 1rem;
            text-align: center;
        }

        .footer p {
            color: white;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-content">
                <img src="pikachu.gif" alt="Player" class="pikachu-image">
                <div class="text-section">
                    <h1>Coming Soon</h1>
                    <p>PokiPlanet is under construction</p>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <p>© 2025 PokiPlanet. All rights reserved.</p>
    </footer>
</body>
</html>
